<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .calculator {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 20px;
            width: 320px;
        }
        
        .display {
            background: #f0f0f0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        
        .display-previous {
            color: #888;
            font-size: 14px;
            min-height: 20px;
            margin-bottom: 5px;
        }
        
        .display-current {
            color: #333;
            font-size: 36px;
            font-weight: 300;
            word-wrap: break-word;
            word-break: break-all;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        button {
            border: none;
            border-radius: 10px;
            padding: 20px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        
        button:hover {
            transform: scale(0.95);
        }
        
        button:active {
            transform: scale(0.9);
        }
        
        .btn-number, .btn-decimal {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-operator {
            background: #667eea;
            color: white;
        }
        
        .btn-clear {
            background: #ff6b6b;
            color: white;
        }
        
        .btn-equals {
            background: #51cf66;
            color: white;
            grid-column: span 2;
        }
        
        .btn-zero {
            grid-column: span 2;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="display-previous" id="previous"></div>
            <div class="display-current" id="current">0</div>
        </div>
        <div class="buttons">
            <button class="btn-clear" onclick="calc.clear()">C</button>
            <button class="btn-operator" onclick="calc.delete()">⌫</button>
            <button class="btn-operator" onclick="calc.chooseOperation('÷')">÷</button>
            <button class="btn-operator" onclick="calc.chooseOperation('×')">×</button>
            
            <button class="btn-number" onclick="calc.appendNumber('7')">7</button>
            <button class="btn-number" onclick="calc.appendNumber('8')">8</button>
            <button class="btn-number" onclick="calc.appendNumber('9')">9</button>
            <button class="btn-operator" onclick="calc.chooseOperation('-')">−</button>
            
            <button class="btn-number" onclick="calc.appendNumber('4')">4</button>
            <button class="btn-number" onclick="calc.appendNumber('5')">5</button>
            <button class="btn-number" onclick="calc.appendNumber('6')">6</button>
            <button class="btn-operator" onclick="calc.chooseOperation('+')">+</button>
            
            <button class="btn-number" onclick="calc.appendNumber('1')">1</button>
            <button class="btn-number" onclick="calc.appendNumber('2')">2</button>
            <button class="btn-number" onclick="calc.appendNumber('3')">3</button>
            <button class="btn-equals" onclick="calc.compute()">=</button>
            
            <button class="btn-number btn-zero" onclick="calc.appendNumber('0')">0</button>
            <button class="btn-decimal" onclick="calc.appendNumber('.')">.</button>
        </div>
    </div>

    <script>
        class Calculator {
            constructor(previousDisplayElement, currentDisplayElement) {
                this.previousDisplayElement = previousDisplayElement;
                this.currentDisplayElement = currentDisplayElement;
                this.clear();
            }

            clear() {
                this.currentOperand = '0';
                this.previousOperand = '';
                this.operation = undefined;
                this.updateDisplay();
            }

            delete() {
                if (this.currentOperand === '0') return;
                this.currentOperand = this.currentOperand.toString().slice(0, -1);
                if (this.currentOperand === '') this.currentOperand = '0';
                this.updateDisplay();
            }

            appendNumber(number) {
                if (number === '.' && this.currentOperand.includes('.')) return;
                if (this.currentOperand === '0' && number !== '.') {
                    this.currentOperand = number;
                } else {
                    this.currentOperand = this.currentOperand.toString() + number.toString();
                }
                this.updateDisplay();
            }

            chooseOperation(operation) {
                if (this.currentOperand === '') return;
                if (this.previousOperand !== '') {
                    this.compute();
                }
                this.operation = operation;
                this.previousOperand = this.currentOperand;
                this.currentOperand = '0';
                this.updateDisplay();
            }

            compute() {
                let computation;
                const prev = parseFloat(this.previousOperand);
                const current = parseFloat(this.currentOperand);
                if (isNaN(prev) || isNaN(current)) return;
                
                switch (this.operation) {
                    case '+':
                        computation = prev + current;
                        break;
                    case '-':
                        computation = prev - current;
                        break;
                    case '×':
                        computation = prev * current;
                        break;
                    case '÷':
                        computation = prev / current;
                        break;
                    default:
                        return;
                }
                
                this.currentOperand = computation.toString();
                this.operation = undefined;
                this.previousOperand = '';
                this.updateDisplay();
            }

            updateDisplay() {
                this.currentDisplayElement.textContent = this.currentOperand;
                if (this.operation != null) {
                    this.previousDisplayElement.textContent = 
                        `${this.previousOperand} ${this.operation}`;
                } else {
                    this.previousDisplayElement.textContent = '';
                }
            }
        }

        const previousDisplay = document.getElementById('previous');
        const currentDisplay = document.getElementById('current');
        const calc = new Calculator(previousDisplay, currentDisplay);

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') calc.appendNumber(e.key);
            if (e.key === '.') calc.appendNumber('.');
            if (e.key === '+') calc.chooseOperation('+');
            if (e.key === '-') calc.chooseOperation('-');
            if (e.key === '*') calc.chooseOperation('×');
            if (e.key === '/') { e.preventDefault(); calc.chooseOperation('÷'); }
            if (e.key === 'Enter' || e.key === '=') calc.compute();
            if (e.key === 'Escape') calc.clear();
            if (e.key === 'Backspace') calc.delete();
        });
    </script>
</body>
</html>
